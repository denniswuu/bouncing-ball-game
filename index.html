<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bouncing Ball Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:Segoe UI,Microsoft YaHei,sans-serif;user-select:none}
canvas{display:block}
#ui-overlay{position:fixed;top:20px;left:20px;color:#fff;font-size:16px;text-shadow:0 0 10px rgba(100,200,255,0.8);pointer-events:none;z-index:10}
#score{font-size:24px;font-weight:bold}
#combo{font-size:18px;color:#ffcc00}
#instructions{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:14px;text-align:center;pointer-events:none;z-index:10}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,26,0.95);z-index:20;transition:opacity 0.5s}
#start-screen.hidden{opacity:0;pointer-events:none}
#start-screen h1{font-size:52px;margin-bottom:10px;background:linear-gradient(135deg,#ff6b9d,#c44dff,#6bbaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#subtitle{color:rgba(255,255,255,0.7);margin-bottom:30px;font-size:16px;text-align:center;max-width:500px;line-height:1.6}
#start-btn{padding:15px 60px;font-size:20px;background:linear-gradient(135deg,#6bbaff,#c44dff);border:none;border-radius:30px;color:#fff;cursor:pointer;box-shadow:0 0 20px rgba(107,186,255,0.5);transition:transform 0.2s,box-shadow 0.2s;font-weight:bold;letter-spacing:2px}
#start-btn:hover{transform:scale(1.08);box-shadow:0 0 35px rgba(107,186,255,0.8)}
#game-over{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,26,0.92);z-index:20}
#game-over.show{display:flex}
#game-over h2{font-size:40px;color:#ff6b9d;margin-bottom:10px}
#final-score{font-size:28px;color:#6bbaff;margin-bottom:25px}
#restart-btn{padding:14px 50px;font-size:18px;background:linear-gradient(135deg,#6bbaff,#c44dff);border:none;border-radius:25px;color:#fff;cursor:pointer;box-shadow:0 0 20px rgba(107,186,255,0.5);transition:transform 0.2s;font-weight:bold}
#restart-btn:hover{transform:scale(1.08)}
.level-display{position:fixed;top:20px;right:20px;color:#ffcc00;font-size:18px;font-weight:bold;text-shadow:0 0 10px rgba(255,204,0,0.8);pointer-events:none;z-index:10}
.health-bar-container{position:fixed;top:60px;left:20px;width:150px;height:12px;background:rgba(255,255,255,0.1);border-radius:6px;overflow:hidden;z-index:10;pointer-events:none}
.health-bar{height:100%;background:linear-gradient(90deg,#ff4444,#ff6b9d);border-radius:6px;transition:width 0.3s}
.health-label{position:fixed;top:62px;left:180px;color:rgba(255,255,255,0.7);font-size:12px;z-index:10;pointer-events:none}
</style></head><body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay"><div id="score">Score: 0</div><div id="combo">Combo: 0x</div></div>
<div class="level-display" id="level-display">Level: 1</div>
<div class="health-bar-container"><div class="health-bar" id="health-bar" style="width:100%"></div></div>
<div class="health-label" id="health-label">HP: 100</div>
<div id="instructions">Click to launch! Collect colored balls, avoid red skulls!</div>
<div id="start-screen"><h1>Bouncing Ball Adventure</h1><div id="subtitle">Click screen to launch, collect colored balls for points<br>avoid red skull balls! Get shields and health boosts!</div><button id="start-btn">Start Game</button></div>
<div id="game-over"><h2>Game Over</h2><div id="final-score">Final Score: 0</div><button id="restart-btn">Restart</button></div>
<script>var canvas = document.getElementById("gameCanvas");
var ctx = canvas.getContext('2d');
var W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Stars
class Star {
  constructor() { this.x = Math.random()*W; this.y = Math.random()*H; this.size = Math.random()*2+0.5; this.opacity = Math.random(); this.speed = 0.003+Math.random()*0.008; this.dir = Math.random()>0.5?1:-1; }
  update() { this.opacity += this.speed*this.dir; if(this.opacity>=1) this.dir=-1; if(this.opacity<=0.1) this.dir=1; }
  draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,'+this.opacity+')'; ctx.fill(); }
}
var stars = Array.from({length:200}, function() { return new Star(); });

// Particles
class Particle {
  constructor(x,y,color,speed,size) { this.x=x; this.y=y; var a=Math.random()*Math.PI*2; var v=(speed||6)*(0.5+Math.random()*0.5); this.vx=Math.cos(a)*v; this.vy=Math.sin(a)*v; this.life=1; this.decay=0.015+Math.random()*0.035; this.size=(size||3)*(0.5+Math.random()*0.5); this.color=color; this.gravity=0.08+Math.random()*0.05; }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity; this.vx*=0.99; this.life-=this.decay; }
  draw() { if(this.life<=0) return; ctx.save(); ctx.globalAlpha=this.life; ctx.beginPath(); ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2); ctx.fillStyle=this.color; ctx.fill(); ctx.restore(); }
}

// Player Ball
class PlayerBall {
  constructor(x,y,vx,vy,r) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.r=r; this.trail=[]; this.maxTrail=20; this.invincible=false; this.invTimer=0; this.shield=false; this.shieldTimer=0; }
  update() {
    this.trail.push({x:this.x,y:this.y}); if(this.trail.length>this.maxTrail) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy;
    if(this.x-this.r<0) { this.vx=Math.abs(this.vx); this.x=this.r; bounce(this.x,this.y); }
    if(this.x+this.r>W) { this.vx=-Math.abs(this.vx); this.x=W-this.r; bounce(this.x,this.y); }
    if(this.y-this.r<0) { this.vy=Math.abs(this.vy); this.y=this.r; bounce(this.x,this.y); }
    if(this.y+this.r>H) { this.vy=-Math.abs(this.vy); this.y=H-this.r; bounce(this.x,this.y); }
    if(this.invincible) { this.invTimer--; if(this.invTimer<=0) this.invincible=false; }
    if(this.shield) { this.shieldTimer--; if(this.shieldTimer<=0) this.shield=false; }
  }
  draw() {
    if(this.invincible && Math.floor(Date.now()/80)%2===0) return;
    if(this.shield) { var sa=0.2+Math.sin(Date.now()*0.005)*0.1; var sg=ctx.createRadialGradient(this.x,this.y,this.r,this.x,this.y,this.r*2.5); sg.addColorStop(0,'rgba(100,255,255,'+sa+')'); sg.addColorStop(1,'rgba(100,255,255,0)'); ctx.beginPath(); ctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill(); ctx.strokeStyle='rgba(100,255,255,'+(sa+0.2)+')'; ctx.lineWidth=2; ctx.stroke(); }
    var s=this; this.trail.forEach(function(p,i) { var a=(i/s.trail.length)*0.4; var sz=(i/s.trail.length)*s.r; ctx.beginPath(); ctx.arc(p.x,p.y,sz,0,Math.PI*2); ctx.fillStyle='rgba(100,255,218,'+a+')'; ctx.fill(); });
    var gg=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3); gg.addColorStop(0,'rgba(100,255,218,0.4)'); gg.addColorStop(1,'rgba(100,255,218,0)'); ctx.beginPath(); ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill();
    var bg=ctx.createRadialGradient(this.x-this.r*0.35,this.y-this.r*0.35,0,this.x,this.y,this.r); bg.addColorStop(0,'#fff'); bg.addColorStop(0.3,'rgba(100,255,218,0.95)'); bg.addColorStop(1,'rgba(50,200,180,0.9)'); ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
  }
}
// Collectibles
class Collectible {
  constructor() { this.x=80+Math.random()*(W-160); this.y=80+Math.random()*(H-160); this.r=12+Math.random()*8; this.pulse=Math.random()*Math.PI*2;
    var types=[{c:'#ff6b9d',b:'#ff88bb',g:'rgba(255,107,157,0.4)',p:10,e:'\u2605'},{c:'#6bbaff',b:'#88ccff',g:'rgba(107,186,255,0.4)',p:15,e:'\uD83D\uDC8E'},{c:'#c44dff',b:'#dd88ff',g:'rgba(196,77,255,0.4)',p:20,e:'\uD83D\uDD2E'},{c:'#ffcc00',b:'#ffdd44',g:'rgba(255,204,0,0.4)',p:25,e:'\uD83C\uDF1F'},{c:'#4dff88',b:'#66ffaa',g:'rgba(77,255,136,0.4)',p:30,e:'\uD83C\uDF40'},{c:'#ff4466',b:'#ff6688',g:'rgba(255,68,102,0.4)',p:5,e:'\uD83D\uDC96',h:20},{c:'#44ddff',b:'#66eeff',g:'rgba(68,221,255,0.4)',p:5,e:'\uD83D\uDED6',sh:true}];
    var t=types[Math.floor(Math.random()*types.length)]; this.color=t.c; this.glow=t.g; this.points=t.p; this.emoji=t.e; this.heal=t.h||0; this.shield=t.sh||false; }
  update() { this.pulse+=0.05; }
  draw() { var ps=this.r+Math.sin(this.pulse)*3; var gg=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,ps*2.5); gg.addColorStop(0,this.glow); gg.addColorStop(1,'rgba(0,0,0,0)'); ctx.beginPath(); ctx.arc(this.x,this.y,ps*2.5,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill(); var bg=ctx.createRadialGradient(this.x-ps*0.3,this.y-ps*0.3,0,this.x,this.y,ps); bg.addColorStop(0,'#fff'); bg.addColorStop(0.4,this.color); bg.addColorStop(1,this.glow); ctx.beginPath(); ctx.arc(this.x,this.y,ps,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill(); ctx.font=Math.floor(ps)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.emoji,this.x,this.y); }
}

// Enemies
class Enemy {
  constructor() { this.x=100+Math.random()*(W-200); this.y=100+Math.random()*(H-200); this.r=18+Math.random()*12; this.spd=1.5+Math.random()*1.5; var a=Math.random()*Math.PI*2; this.vx=Math.cos(a)*this.spd; this.vy=Math.sin(a)*this.spd; this.pulse=Math.random()*Math.PI*2; }
  update() { this.x+=this.vx; this.y+=this.vy; this.pulse+=0.06; if(this.x<this.r||this.x>W-this.r){this.vx*=-1;this.x=Math.max(this.r,Math.min(W-this.r,this.x));} if(this.y<this.r||this.y>H-this.r){this.vy*=-1;this.y=Math.max(this.r,Math.min(H-this.r,this.y));} }
  draw() { var ps=this.r+Math.sin(this.pulse)*4; var gg=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,ps*2.2); gg.addColorStop(0,'rgba(255,50,50,0.5)'); gg.addColorStop(1,'rgba(255,0,0,0)'); ctx.beginPath(); ctx.arc(this.x,this.y,ps*2.2,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill(); var bg=ctx.createRadialGradient(this.x-ps*0.3,this.y-ps*0.3,0,this.x,this.y,ps); bg.addColorStop(0,'rgba(255,180,180,1)'); bg.addColorStop(0.5,'rgba(255,50,50,1)'); bg.addColorStop(1,'rgba(120,0,0,1)'); ctx.beginPath(); ctx.arc(this.x,this.y,ps,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill(); ctx.font=Math.floor(ps*1.2)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('\u2620\uFE0F',this.x,this.y); }
}

// PowerUps
class PowerUp {
  constructor(x,y) { this.x=x||Math.random()*(W-200)+100; this.y=y||Math.random()*(H*0.4)+50; this.r=15; this.pulse=0; this.type=Math.random()>0.5?'heal':'shield'; this.emoji=this.type==='heal'?'\uD83D\uDC96':'\uD83D\uDED6'; }
  update() { this.pulse+=0.08; this.y+=0.3; if(this.y>H-50) this.y=50; }
  draw() { var ps=this.r+Math.sin(this.pulse)*4; var c=this.type==='heal'?'rgba(255,68,102,0.5)':'rgba(68,221,255,0.5)'; var gg=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,ps*3); gg.addColorStop(0,c); gg.addColorStop(1,'rgba(0,0,0,0)'); ctx.beginPath(); ctx.arc(this.x,this.y,ps*3,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill(); ctx.beginPath(); ctx.arc(this.x,this.y,ps,0,Math.PI*2); var gc=ctx.createRadialGradient(this.x-3,this.y-3,0,this.x,this.y,ps); gc.addColorStop(0,'#fff'); gc.addColorStop(0.5,this.type==='heal'?'#ff4466':'#44ddff'); gc.addColorStop(1,this.type==='heal'?'#cc2244':'#22aacc'); ctx.fillStyle=gc; ctx.fill(); ctx.font=Math.floor(ps)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.emoji,this.x,this.y); }
}

// FloatingText
class FloatingText {
  constructor(x,y,text,color) { this.x=x; this.y=y; this.text=text; this.color=color; this.life=1; this.vy=-2; }
  update() { this.y+=this.vy; this.life-=0.02; }
  draw() { if(this.life<=0) return; ctx.save(); ctx.globalAlpha=this.life; ctx.font='bold 18px Arial'; ctx.fillStyle=this.color; ctx.textAlign='center'; ctx.shadowColor=this.color; ctx.shadowBlur=10; ctx.fillText(this.text,this.x,this.y); ctx.restore(); }
}
// Game State
var player, collectibles, enemies, particles, powerUps, floatingTexts;
var score=0, combo=0, comboTimer=0, health=100, maxHealth=100, level=1;
var enemiesKilled=0, gameRunning=false, animFrame, lastTime=0, difficultyTimer=0;

function bounce(x,y) { for(var i=0;i<8;i++) particles.push(new Particle(x,y,'rgba(100,255,218,0.8)',5,3)); }
function explosion(x,y,color,count) { for(var i=0;i<(count||20);i++) particles.push(new Particle(x,y,color,8,4)); }

function initGame() {
  player=new PlayerBall(W/2,H/2,4,-3,14);
  collectibles=[]; enemies=[]; particles=[]; powerUps=[]; floatingTexts=[];
  score=0; combo=0; comboTimer=0; health=100; level=1; enemiesKilled=0; difficultyTimer=0;
  updateUI();
  for(var i=0;i<6;i++) collectibles.push(new Collectible());
  for(var i=0;i<3;i++) enemies.push(new Enemy());
}

function updateUI() {
  document.getElementById('score').textContent='Score: '+score;
  document.getElementById('combo').textContent='Combo: '+combo+'x';
  document.getElementById('level-display').textContent='Level: '+level;
  document.getElementById('health-bar').style.width=Math.max(0,health)+'%';
  document.getElementById('health-label').textContent='HP: '+Math.max(0,Math.round(health));
}

function checkCollisions() {
  if(!player) return;
  var rem=[];
  for(var i=0;i<collectibles.length;i++){
    var c=collectibles[i]; var dx=player.x-c.x, dy=player.y-c.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<player.r+c.r){
      combo++; comboTimer=120; var pts=c.points*Math.max(1,combo); score+=pts;
      floatingTexts.push(new FloatingText(c.x,c.y,'+'+pts,c.color)); explosion(c.x,c.y,c.color,15);
      if(c.heal){health=Math.min(maxHealth,health+c.heal); floatingTexts.push(new FloatingText(c.x,c.y-20,'HP+'+c.heal,'#ff4466'));}
      if(c.shield){player.shield=true; player.shieldTimer=300; floatingTexts.push(new FloatingText(c.x,c.y-20,'SHIELD!','#44ddff'));}
      updateUI();
    } else { rem.push(c); }
  }
  collectibles=rem;
  while(collectibles.length<4) collectibles.push(new Collectible());
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i]; var dx=player.x-e.x, dy=player.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<player.r+e.r){
      if(player.shield){
        explosion(e.x,e.y,'rgba(68,221,255,0.8)',25); player.shield=false; player.shieldTimer=0;
        enemies.splice(i,1); i--; score+=50; combo+=2; comboTimer=120;
        floatingTexts.push(new FloatingText(e.x,e.y,'+50','#44ddff')); updateUI();
      } else if(!player.invincible){
        health-=25; player.invincible=true; player.invTimer=60;
        explosion(player.x,player.y,'rgba(255,50,50,0.8)',25); updateUI();
        if(health<=0){gameOver(); return;}
      }
    }
  }
  for(var i=0;i<powerUps.length;i++){
    var p=powerUps[i]; var dx=player.x-p.x, dy=player.y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<player.r+p.r){
      if(p.type==='heal'){health=Math.min(maxHealth,health+30); floatingTexts.push(new FloatingText(p.x,p.y,'HP+30','#ff4466'));}
      else{player.shield=true; player.shieldTimer=480; floatingTexts.push(new FloatingText(p.x,p.y,'SHIELD!','#44ddff'));}
      explosion(p.x,p.y,p.type==='heal'?'#ff4466':'#44ddff',15);
      powerUps.splice(i,1); i--; updateUI();
    }
  }
}
function increaseDifficulty() {
  difficultyTimer++;
  if(difficultyTimer%300===0){
    level++; updateUI();
    if(enemies.length<3+level*2) enemies.push(new Enemy());
    for(var i=0;i<enemies.length;i++) enemies[i].spd=Math.min(4,enemies[i].spd+0.1);
    if(level%2===0) powerUps.push(new PowerUp());
  }
}

function gameOver() {
  gameRunning=false;
  explosion(player.x,player.y,'rgba(100,255,218,0.8)',60);
  explosion(player.x,player.y,'rgba(255,100,100,0.8)',40);
  document.getElementById('final-score').textContent='Final Score: '+score;
  document.getElementById('game-over').classList.add('show');
}

function gameLoop(ts) {
  if(!lastTime) lastTime=ts;
  var bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#050510'); bg.addColorStop(0.5,'#0a0a25'); bg.addColorStop(1,'#101035');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  for(var i=0;i<stars.length;i++){ stars[i].update(); stars[i].draw(); }
  if(gameRunning){
    if(comboTimer>0){comboTimer--; if(comboTimer<=0){combo=0;updateUI();}}
    increaseDifficulty();
    if(Math.random()<0.002) powerUps.push(new PowerUp());
    player.update();
    for(var i=0;i<collectibles.length;i++) collectibles[i].update();
    for(var i=0;i<enemies.length;i++) enemies[i].update();
    for(var i=0;i<powerUps.length;i++) powerUps[i].update();
    particles=particles.filter(function(p){p.update();return p.life>0;});
    floatingTexts=floatingTexts.filter(function(f){f.update();return f.life>0;});
    checkCollisions();
    collectibles.forEach(function(c){c.draw();});
    if(powerUps) powerUps.forEach(function(p){p.draw();});
    enemies.forEach(function(e){e.draw();});
    player.draw();
    floatingTexts.forEach(function(f){f.draw();});
  }
  particles.forEach(function(p){p.draw();});
  animFrame=requestAnimationFrame(gameLoop);
}

// Input
function handleClick(cx,cy){
  if(!gameRunning||!player) return;
  var dx=cx-player.x, dy=cy-player.y, dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<5) return;
  var spd=6+level*0.3;
  player.vx=(dx/dist)*spd; player.vy=(dy/dist)*spd;
  explosion(player.x,player.y,'rgba(100,255,218,0.8)',12);
}
canvas.addEventListener('click',function(e){handleClick(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length>0)handleClick(e.touches[0].clientX,e.touches[0].clientY);});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault(); if(!gameRunning) return;
    var a=Math.random()*Math.PI*2, sp=6+level*0.3;
    player.vx=Math.cos(a)*sp; player.vy=Math.sin(a)*sp;
    explosion(player.x,player.y,'rgba(100,255,218,0.8)',12);
  }
});

// Buttons
document.getElementById('start-btn').addEventListener('click',function(){
  document.getElementById('start-screen').classList.add('hidden');
  setTimeout(function(){document.getElementById('start-screen').style.display='none';},500);
  initGame(); gameRunning=true; lastTime=0; animFrame=requestAnimationFrame(gameLoop);
});
document.getElementById('restart-btn').addEventListener('click',function(){
  document.getElementById('game-over').classList.remove('show');
  if(animFrame) cancelAnimationFrame(animFrame); lastTime=0;
  initGame(); gameRunning=true; animFrame=requestAnimationFrame(gameLoop);
});

// Initial background
function drawInitial(){
  var bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#050510'); bg.addColorStop(0.5,'#0a0a25'); bg.addColorStop(1,'#101035');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  for(var i=0;i<stars.length;i++){stars[i].update();stars[i].draw();}
  if(!gameRunning) requestAnimationFrame(drawInitial);
}
drawInitial();
</script></body></html>
